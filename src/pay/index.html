<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment – centricle</title>
    <script src="https://js.stripe.com/v3/"></script>
    <link rel="stylesheet" href="/styles.css" />
</head>

<body>
    <nav class="bg-slate-800 py-4">
        <div class="max-w-6xl mx-auto px-6 flex items-center justify-between">
            <a href="/" class="text-white text-xl font-bold">centricle</a>
            <ul class="flex gap-6">
                <li><a href="/" class="text-white hover:text-slate-300 transition-colors">Home</a></li>
            </ul>
        </div>
    </nav>

    <section class="section-spacing bg-slate-50 min-h-screen">
        <div class="max-w-lg mx-auto px-6">
            <div class="card overflow-hidden shadow-lg">
                <div class="bg-gradient-to-br from-slate-700 to-slate-800 text-white p-8 text-center">
                    <h1 class="text-3xl font-light mb-2">Complete Payment</h1>
                    <p class="opacity-90">Secure payment processing</p>
                </div>

                <div class="p-8">
                    <div class="mb-6">
                        <label for="payment-element" class="block text-sm font-medium text-slate-700 mb-2">Card Information</label>
                        <div id="payment-element" class="transition-all duration-300">
                            <!-- Stripe Elements will create form elements here -->
                        </div>
                        <div id="card-errors" role="alert" class="text-red-600 text-sm mt-2 min-h-5 hidden empty:hidden"></div>
                    </div>

                    <div class="mb-6">
                        <label for="email" class="block text-sm font-medium text-slate-700 mb-2">Email</label>
                        <input 
                            type="email" 
                            id="email" 
                            placeholder="you@example.com"
                            class="w-full px-3 py-3 bg-white border border-slate-200 rounded-md text-slate-900 placeholder-slate-400 focus:border-slate-400 focus:ring-2 focus:ring-slate-200 focus:outline-none transition-all"
                        >
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                        <div>
                            <label for="amount" class="block text-sm font-medium text-slate-700 mb-2">Amount ($)</label>
                            <input 
                                type="number" 
                                id="amount" 
                                min="1"
                                step="0.01"
                                placeholder="500.00"
                                class="w-full px-3 py-3 bg-white border border-slate-200 rounded-md text-slate-900 placeholder-slate-400 focus:border-slate-400 focus:ring-2 focus:ring-slate-200 focus:outline-none transition-all"
                            >
                        </div>
                        <div>
                            <label for="invoice" class="block text-sm font-medium text-slate-700 mb-2">Invoice #</label>
                            <input 
                                type="text" 
                                id="invoice" 
                                placeholder="INV-001"
                                class="w-full px-3 py-3 bg-white border border-slate-200 rounded-md text-slate-900 placeholder-slate-400 focus:border-slate-400 focus:ring-2 focus:ring-slate-200 focus:outline-none transition-all"
                            >
                        </div>
                    </div>

                    <button type="button" id="submit-button" class="btn btn-primary w-full flex items-center justify-center">
                        <span id="button-text">Pay Now</span>
                        <div id="spinner" class="animate-spin ml-2 h-4 w-4 border-2 border-white border-t-transparent rounded-full" style="display: none;"></div>
                    </button>
                </div>

                <div class="text-center text-xs text-slate-500 pb-6">
                    Powered by Stripe
                </div>
            </div>
        </div>
    </section>

    <footer class="bg-slate-900 text-slate-400 py-8 text-center">
        <div class="max-w-6xl mx-auto px-6">
            <p>&copy; 2025 CENTRICLE LLC</p>
        </div>
    </footer>

    <script>
        // Initialize Stripe with your publishable key
        const stripe = Stripe('pk_test_51ReRbD2n3msnFGGQi9SVVWxXSKFfW8WWyrMAq948YjH6KdpTyX25vbj2hZUVLo7q5cS0dSuaYBKxlYyIZ8OGOlui00LTkInoYP');
        const elements = stripe.elements({
            mode: 'payment',
            currency: 'usd',
            amount: 50000, // Default to $500.00 (in cents)
        });

        // Create payment element
        const paymentElement = elements.create('payment', {
            layout: 'tabs',
            fields: {
                billingDetails: 'never'
            }
        });

        // Mount payment element
        paymentElement.mount('#payment-element');

        // Handle real-time validation errors from the payment Element
        paymentElement.on('change', ({error}) => {
            const displayError = document.getElementById('card-errors');
            if (error) {
                displayError.textContent = error.message;
            } else {
                displayError.textContent = '';
            }
        });

        // Handle form submission
        const submitButton = document.getElementById('submit-button');
        const buttonText = document.getElementById('button-text');
        const spinner = document.getElementById('spinner');
        
        submitButton.addEventListener('click', async () => {
            const cardErrors = document.getElementById('card-errors');
            
            // Clear any previous errors
            cardErrors.textContent = '';
            
            // Disable submit button and show loading
            submitButton.disabled = true;
            buttonText.textContent = 'Processing...';
            spinner.style.display = 'inline-block';

            const email = document.getElementById('email').value;
            const amount = document.getElementById('amount').value;
            const invoice = document.getElementById('invoice').value;

            try {
                // Create payment intent on your backend
                const response = await fetch('/.netlify/functions/create-payment-intent', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        amount: Math.round(parseFloat(amount) * 100), // Convert to cents
                        currency: 'usd',
                        receipt_email: email,
                        invoice_number: invoice,
                    }),
                });

                if (!response.ok) {
                    throw new Error('Network response was not ok');
                }

                const { client_secret } = await response.json();

                // Confirm payment with Stripe
                const result = await stripe.confirmPayment({
                    elements,
                    clientSecret: client_secret,
                    confirmParams: {
                        return_url: window.location.href,
                        receipt_email: email,
                    },
                    redirect: 'if_required'
                });

                if (result.error) {
                    // Show error to customer
                    cardErrors.textContent = result.error.message;
                } else {
                    // Payment succeeded
                    alert('Payment successful! Thank you for your purchase.');
                    // Reset form
                    document.getElementById('email').value = '';
                    document.getElementById('amount').value = '';
                    document.getElementById('invoice').value = '';
                    paymentElement.clear();
                }
            } catch (error) {
                console.error('Error:', error);
                cardErrors.textContent = 'An error occurred. Please try again.';
            }

            // Re-enable submit button and hide loading
            submitButton.disabled = false;
            buttonText.textContent = 'Pay Now';
            spinner.style.display = 'none';
        });

        // Add interactive effects to inputs
        const inputs = document.querySelectorAll('input[type="email"], input[type="number"], input[type="text"]');
        inputs.forEach(input => {
            input.addEventListener('focus', function() {
                this.style.transform = 'scale(1.02)';
            });
            
            input.addEventListener('blur', function() {
                this.style.transform = 'scale(1)';
            });
        });
    </script>
</body>
</html>
